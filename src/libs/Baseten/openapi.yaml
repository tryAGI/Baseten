                        "examples": [
                            [
                                "*.bin",
                                "*.h5"
                            ]
                        ],
                        "title": "Ignore Patterns"
                    },
                    "auth_secret_name": {
                        "anyOf": [
                            {
                                "type": "string"
                            },
                            {
                                "type": "null"
                            }
                        ],
                        "default": null,
